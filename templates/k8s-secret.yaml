{{- range $index, $ns := .Values.k8snestednamespaces }}
{{- if not $ns.name }}
{{- fail (printf "k8snestednamespaces[%d].name is required" $index) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: v-k8s-cloudinit
  namespace: {{ $ns.name | quote }}
type: Opaque
stringData:
  userdata: |
    #cloud-config
    ssh_pwauth: True
    chpasswd: { expire: False }
    password: {{ required "k8sNodeCustomization.password is required" $.Values.k8sNodeCustomization.password }}
    disable_root: false
    packages:
      - jq
      - conntrack
    write_files:
      - path: /tmp/user-data
        owner: 'root:root'
        permissions: '0755'
        content: |
          #cloud-config
          install:
            reboot: true
            poweroff: false
          stylus:
            skipKubeVip: false
            site:
              edgeHostToken: {{ required "k8sNodeCustomization.edgeHostToken is required" $.Values.k8sNodeCustomization.edgeHostToken }}
              paletteEndpoint: {{ required "k8sNodeCustomization.paletteEndpoint is required" $.Values.k8sNodeCustomization.paletteEndpoint }}
              tags:
                name: %NAME%
    runcmd:
      - apt-get update
      - apt-get install -y qemu-guest-agent
      - systemctl start qemu-guest-agent
      - |
        mkdir -p /system/oem; mkdir -p /oem; mkdir -p /usr/local/cloud-config; mkdir -p /opt/spectrocloud/state
        curl --location --output /tmp/palette-agent-install.sh https://github.com/spectrocloud/agent-mode/releases/latest/download/palette-agent-install.sh
        chmod +x /tmp/palette-agent-install.sh
        export USERDATA=/tmp/user-data
        sed -i "s/%NAME%/$(hostname)/" /tmp/user-data
        sudo --preserve-env /tmp/palette-agent-install.sh
---
{{- end }}
